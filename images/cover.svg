      <stop offset="30%" style="stop-color:#2EE59D;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#2EE59D;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#2EE59D;stop-opacity:0" />
    </linearGradient>

    <!-- Clip path -->
    <clipPath id="bounds">
      <rect width="800" height="300" />
    </clipPath>
  </defs>

