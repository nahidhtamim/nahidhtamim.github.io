  <defs>
    <!-- Base dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040c16;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#071220;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#040e1a;stop-opacity:1" />
    </linearGradient>

    <!-- Teal radial glow top-left -->
    <radialGradient id="glowLeft" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#2EE59D;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#2EE59D;stop-opacity:0" />
    </radialGradient>

    <!-- Teal radial glow bottom-right -->
