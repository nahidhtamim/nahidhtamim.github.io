<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EE59D;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1ab878;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2a1f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#081810;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="52" height="52" rx="13" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="52" height="52" rx="13" fill="none" stroke="url(#logoGrad)" stroke-width="1.2" opacity="0.7"/>

  <!-- Top accent bar -->
  <rect x="14" y="0" width="24" height="2" rx="1" fill="url(#logoGrad)" opacity="0.9"/>

  <!-- N glyph -->
  <g filter="url(#glow)" fill="url(#logoGrad)">
    <!-- N: left vertical -->
    <rect x="10" y="15" width="3" height="18" rx="1"/>
    <!-- N: diagonal -->
    <polygon points="10,15 13,15 21,30 21,33 18,33"/>
    <!-- N: right vertical -->
    <rect x="18" y="15" width="3" height="18" rx="1"/>
  </g>

  <!-- H glyph -->
  <g filter="url(#glow)" fill="url(#logoGrad)">
    <!-- H: left vertical -->
    <rect x="24" y="15" width="3" height="18" rx="1"/>
    <!-- H: crossbar -->
    <rect x="24" y="22.5" width="8" height="3" rx="1"/>
    <!-- H: right vertical -->
    <rect x="29" y="15" width="3" height="18" rx="1"/>
  </g>

  <!-- T glyph -->
  <g filter="url(#glow)" fill="url(#logoGrad)">
    <!-- T: top bar -->
    <rect x="34" y="15" width="9" height="3" rx="1"/>
    <!-- T: vertical stem -->
    <rect x="37" y="15" width="3" height="18" rx="1"/>
  </g>

  <!-- Bottom dot accent -->
  <circle cx="26" cy="42" r="2" fill="url(#logoGrad)" opacity="0.8"/>
</svg>
